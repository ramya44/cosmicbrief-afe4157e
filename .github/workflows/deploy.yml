name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build with prerendering
        run: npm run build
        env:
          PRERENDER: 'true'

      - name: Verify prerendered pages
        run: |
          echo "Checking prerendered pages..."
          if [ -f "dist/blog/ashwini-nakshatra/index.html" ]; then
            echo "✓ Ashwini nakshatra page prerendered"
            grep -o 'og:title" content="[^"]*"' dist/blog/ashwini-nakshatra/index.html | head -1
            grep -o 'og:description" content="[^"]*"' dist/blog/ashwini-nakshatra/index.html | head -1
          else
            echo "✗ Ashwini nakshatra page NOT found"
          fi
          echo "Total prerendered pages: $(find dist -name 'index.html' | wc -l)"

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Pull Vercel environment
        run: vercel pull --yes --token=${{ secrets.VERCEL_TOKEN }}

      - name: Prepare Vercel output directory
        run: |
          mkdir -p .vercel/output/static
          cp -r dist/* .vercel/output/static/
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              {
                "src": "/vedic/(.*)",
                "dest": "/index.html"
              },
              {
                "src": "/weekly/(.*)",
                "dest": "/index.html"
              },
              {
                "src": "/chat",
                "dest": "/index.html"
              },
              {
                "src": "/get-birth-chart",
                "dest": "/index.html"
              },
              {
                "src": "/birth-chart",
                "dest": "/index.html"
              },
              {
                "src": "/compatibility",
                "dest": "/index.html"
              },
              {
                "src": "/life-arc",
                "dest": "/index.html"
              },
              {
                "src": "/(.*)",
                "dest": "/index.html"
              }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
